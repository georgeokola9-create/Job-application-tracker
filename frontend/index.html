<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Job Application Tracker</h1>
    </header>

    <main>
        <table id="applications-table">
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Date Applied</th>
                    <th>Deadline</th>
                </tr>
            </thead>
            <tbody id="applications-body">
                <!-- rows inserted here by JavaScript -->
            </tbody>
        </table>
        <p id="empty-message" style="display: none;">No applications yet.</p>
    </main>

    <script src="js/app.js"></script>
</body>
</html>

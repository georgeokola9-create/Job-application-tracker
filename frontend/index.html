<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <header class="page-header">
            <div>
                <h1>Job Application Tracker</h1>
                <p class="subtitle">Track every application in one place</p>
            </div>
            <button id="open-add-modal-btn" class="btn btn-primary">+ Add Application</button>
        </header>

        <main class="card">
            <table id="applications-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Date Applied</th>
                        <th>Deadline</th>
                        <th>Portal</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="applications-body"></tbody>
            </table>
            <p id="empty-message" class="empty-message" style="display: none;">
                No applications yet. Click <strong>+ Add Application</strong> to get started.
            </p>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Add Application</h2>
                <button id="close-modal-btn" class="modal-close" aria-label="Close">&times;</button>
            </div>

            <form id="application-form">
                <input type="hidden" id="application-id">

                <div class="form-row">
                    <div class="form-group">
                        <label for="company_name">Company *</label>
                        <input type="text" id="company_name" required>
                    </div>
                    <div class="form-group">
                        <label for="role_title">Role *</label>
                        <input type="text" id="role_title" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="applied">Applied</option>
                            <option value="under_review">Under Review</option>
                            <option value="interview_scheduled">Interview Scheduled</option>
                            <option value="interviewed">Interviewed</option>
                            <option value="offer">Offer</option>
                            <option value="rejected">Rejected</option>
                            <option value="withdrawn">Withdrawn</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date_applied">Date Applied *</label>
                        <input type="date" id="date_applied" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="application_deadline">Deadline</label>
                        <input type="date" id="application_deadline">
                    </div>
                    <div class="form-group">
                        <label for="follow_up_date">Follow-up Date</label>
                        <input type="date" id="follow_up_date">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="contact_person">Contact Person</label>
                        <input type="text" id="contact_person">
                    </div>
                    <div class="form-group">
                        <label for="contact_email">Contact Email</label>
                        <input type="email" id="contact_email">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reference_number">Reference Number</label>
                        <input type="text" id="reference_number">
                    </div>
                    <div class="form-group">
                        <label for="portal_url">Portal Link</label>
                        <input type="url" id="portal_url" placeholder="https://...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>

                <div id="form-error" class="form-error" style="display: none;"></div>

                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Application</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
